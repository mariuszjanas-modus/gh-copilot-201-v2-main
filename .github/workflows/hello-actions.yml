name: GitHub Actions Demo

# 1. When should this run?
on: [push, pull_request]

jobs:
  # 2. Give the job a name
  greet-and-test:
    # 3. Choose the operating system
    runs-on: ubuntu-latest

    steps:
      # 4. Pull the code from the repo into the runner
      - name: Check out repository code
        uses: actions/checkout@v4

      # 5. Run a simple script
      - name: Run a greeting script
        run: |
          echo "Hello, Team! The robot is now checking your code."
          python --version

      # 6. A "failing" step (optional for teaching)
      - name: Check for secret files
        run: ls -R
